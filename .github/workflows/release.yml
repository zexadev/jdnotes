name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract content between ## vX.Y.Z and the next ## heading (or EOF)
          BODY=$(sed -n "/^## v${VERSION}/,/^## /{/^## v${VERSION}/d;/^## /d;p}" docs/src/content/changelog.mdx)
          # If no match, try without v prefix
          if [ -z "$BODY" ]; then
            BODY=$(sed -n "/^## ${VERSION}/,/^## /{/^## ${VERSION}/d;/^## /d;p}" docs/src/content/changelog.mdx)
          fi
          # Fallback
          if [ -z "$BODY" ]; then
            BODY="发布 v${VERSION}"
          fi
          # Write to file for the release step
          echo "$BODY" > release_notes.md

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'JD Notes ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false

      - name: Update release body
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --notes-file release_notes.md
